<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a237e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Inventaire Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #1a237e;
            --primary-light: #3949ab;
            --accent: #00bcd4;
            --danger: #e53935;
            --success: #43a047;
            --warning: #fb8c00;
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(26,35,126,0.3);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-stats {
            display: flex;
            gap: 16px;
            font-size: 13px;
            opacity: 0.9;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-value {
            font-weight: 700;
            font-size: 16px;
        }

        /* Search & Filter */
        .search-bar {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 80px;
            z-index: 90;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary-light);
        }

        .filter-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Filter Panel */
        .filter-panel {
            background: white;
            padding: 0 16px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            border-bottom: 1px solid var(--border);
        }

        .filter-panel.open {
            max-height: 200px;
            padding: 12px 16px;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Items List */
        .items-container {
            padding: 12px;
            padding-bottom: 100px;
        }

        .item-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            gap: 14px;
            align-items: flex-start;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .item-card:active {
            transform: scale(0.98);
        }

        .item-image {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .item-category {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 10px;
            background: #e8eaf6;
            color: var(--primary);
            font-weight: 500;
        }

        .item-sku {
            font-size: 12px;
            color: var(--text-light);
            font-family: 'SF Mono', monospace;
        }

        .item-stock {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }

        .stock-bar {
            flex: 1;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }

        .stock-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .stock-fill.high { background: var(--success); }
        .stock-fill.medium { background: var(--warning); }
        .stock-fill.low { background: var(--danger); }

        .stock-text {
            font-size: 13px;
            font-weight: 600;
            min-width: 40px;
            text-align: right;
        }

        .item-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-top: 4px;
        }

        .item-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn.edit {
            background: #e3f2fd;
            color: var(--primary-light);
        }

        .action-btn.delete {
            background: #ffebee;
            color: var(--danger);
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--text);
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, #00838f 100%);
            color: white;
            border: none;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,188,212,0.4);
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.2s;
        }

        .fab:active {
            transform: scale(0.9);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--bg);
            font-size: 20px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }

        .form-input, .form-select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            background: white;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--primary-light);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            width: 100%;
            padding: 16px;
            background: var(--bg);
            color: var(--text);
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Bottom Sheet for Actions */
        .sheet-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 2000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .sheet-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .sheet {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 24px 24px 0 0;
            padding: 16px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .sheet-overlay.active .sheet {
            transform: translateY(0);
        }

        .sheet-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sheet-item:active {
            background: var(--bg);
        }

        .sheet-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .sheet-item-text {
            font-size: 16px;
            font-weight: 500;
        }

        /* Install Banner */
        .install-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5000;
            transform: translateY(-100%);
            transition: transform 0.3s;
        }

        .install-banner.show {
            transform: translateY(0);
        }

        .install-btn {
            background: white;
            color: var(--primary);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Scrollbar hide */
        ::-webkit-scrollbar { display: none; }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .item-card {
            animation: slideIn 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- Install Banner -->
    <div class="install-banner" id="installBanner">
        <span>📦 Installez Inventaire Pro sur votre écran d'accueil</span>
        <button class="install-btn" onclick="installApp()">Installer</button>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <h1>📦 Inventaire Pro</h1>
        </div>
        <div class="header-stats">
            <div class="stat-item">
                <span>Articles:</span>
                <span class="stat-value" id="totalItems">0</span>
            </div>
            <div class="stat-item">
                <span>Valeur:</span>
                <span class="stat-value" id="totalValue">0€</span>
            </div>
            <div class="stat-item">
                <span>Alertes:</span>
                <span class="stat-value" id="lowStockCount" style="color: #ffeb3b;">0</span>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="Rechercher un article..." oninput="filterItems()">
        <button class="filter-btn" id="filterBtn" onclick="toggleFilters()">🔽</button>
    </div>

    <!-- Filter Panel -->
    <div class="filter-panel" id="filterPanel">
        <div class="filter-group">
            <div class="filter-chip active" onclick="setCategory('all')">Tous</div>
            <div class="filter-chip" onclick="setCategory('electronique')">Électronique</div>
            <div class="filter-chip" onclick="setCategory('alimentaire')">Alimentaire</div>
            <div class="filter-chip" onclick="setCategory('textile')">Textile</div>
            <div class="filter-chip" onclick="setCategory('outillage')">Outillage</div>
            <div class="filter-chip" onclick="setCategory('autre')">Autre</div>
        </div>
    </div>

    <!-- Items List -->
    <div class="items-container" id="itemsContainer">
        <div class="empty-state" id="emptyState">
            <div class="icon">📭</div>
            <h3>Aucun article</h3>
            <p>Commencez par ajouter votre premier article</p>
        </div>
    </div>

    <!-- FAB -->
    <button class="fab" onclick="openModal()">+</button>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Nouvel Article</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <form id="itemForm" onsubmit="saveItem(event)">
                <input type="hidden" id="itemId">
                <div class="form-group">
                    <label class="form-label">Nom de l'article *</label>
                    <input type="text" class="form-input" id="itemName" required placeholder="Ex: iPhone 15 Pro">
                </div>
                <div class="form-group">
                    <label class="form-label">Catégorie</label>
                    <select class="form-select" id="itemCategory">
                        <option value="electronique">Électronique</option>
                        <option value="alimentaire">Alimentaire</option>
                        <option value="textile">Textile</option>
                        <option value="outillage">Outillage</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Quantité *</label>
                        <input type="number" class="form-input" id="itemQuantity" required min="0" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Stock minimum</label>
                        <input type="number" class="form-input" id="itemMinStock" min="0" placeholder="5">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Prix unitaire (€) *</label>
                        <input type="number" class="form-input" id="itemPrice" required min="0" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Référence (SKU)</label>
                        <input type="text" class="form-input" id="itemSku" placeholder="REF-001">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <input type="text" class="form-input" id="itemDescription" placeholder="Description optionnelle...">
                </div>
                <button type="submit" class="btn-primary">💾 Enregistrer</button>
                <button type="button" class="btn-secondary" onclick="closeModal()">Annuler</button>
            </form>
        </div>
    </div>

    <!-- Action Sheet -->
    <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
        <div class="sheet" onclick="event.stopPropagation()">
            <div class="sheet-item" onclick="editCurrentItem()">
                <div class="sheet-item-icon" style="background: #e3f2fd;">✏️</div>
                <div class="sheet-item-text">Modifier</div>
            </div>
            <div class="sheet-item" onclick="duplicateCurrentItem()">
                <div class="sheet-item-icon" style="background: #f3e5f5;">📋</div>
                <div class="sheet-item-text">Dupliquer</div>
            </div>
            <div class="sheet-item" onclick="deleteCurrentItem()">
                <div class="sheet-item-icon" style="background: #ffebee;">🗑️</div>
                <div class="sheet-item-text" style="color: #e53935;">Supprimer</div>
            </div>
            <div class="sheet-item" onclick="closeSheet()">
                <div class="sheet-item-icon" style="background: #f5f5f5;">✕</div>
                <div class="sheet-item-text">Annuler</div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
